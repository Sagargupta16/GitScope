<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub Profile Insights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #24292f;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #d0d7de;
      background: #f6f8fa;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header p {
      font-size: 12px;
      color: #656d76;
      margin-top: 4px;
    }
    .section {
      padding: 16px;
    }
    .section label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .section p.hint {
      font-size: 11px;
      color: #656d76;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #238636;
      color: #fff;
    }
    .btn:hover { background: #2ea043; }
    .status {
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }
    .status.success { color: #1a7f37; }
    .status.error { color: #cf222e; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #d0d7de;
      font-size: 11px;
      color: #656d76;
      text-align: center;
    }
    .footer a { color: #0969da; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .token-info {
      padding: 12px 16px;
      border-bottom: 1px solid #d0d7de;
      font-size: 12px;
      background: #ddf4ff;
      color: #0969da;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>GitHub Profile Insights</h1>
    <p>View contribution stats on any GitHub profile</p>
  </div>

  <div class="section">
    <label for="tokenInput">GitHub Personal Access Token</label>
    <p class="hint">
      Create a token at
      <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a>
      with <strong>read:user</strong> scope. Your token is stored locally and never sent anywhere except GitHub's API.
    </p>
    <input type="text" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
    <button class="btn" id="saveBtn">Save Token</button>
    <div class="status" id="status"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/Sagargupta16/github-profile-insights" target="_blank">GitHub</a>
    &middot; v1.0.0
  </div>

  <script src="../js/popup-script.js"></script>
</body>
</html>
