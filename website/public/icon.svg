<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#0969da"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- GitHub-style contribution graph (3x3 grid of rounded squares) -->
  <g transform="translate(20, 22)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="16" height="16" rx="3" fill="rgba(255,255,255,0.25)"/>
    <rect x="20" y="0" width="16" height="16" rx="3" fill="rgba(255,255,255,0.45)"/>
    <rect x="40" y="0" width="16" height="16" rx="3" fill="rgba(255,255,255,0.7)"/>
    <!-- Row 2 -->
    <rect x="0" y="20" width="16" height="16" rx="3" fill="rgba(255,255,255,0.45)"/>
    <rect x="20" y="20" width="16" height="16" rx="3" fill="rgba(255,255,255,0.9)"/>
    <rect x="40" y="20" width="16" height="16" rx="3" fill="rgba(255,255,255,0.55)"/>
    <!-- Row 3 -->
    <rect x="0" y="40" width="16" height="16" rx="3" fill="rgba(255,255,255,0.7)"/>
    <rect x="40" y="40" width="16" height="16" rx="3" fill="rgba(255,255,255,0.35)"/>
    <rect x="20" y="40" width="16" height="16" rx="3" fill="rgba(255,255,255,0.9)"/>
  </g>

  <!-- Magnifying glass / insight lens -->
  <g transform="translate(52, 48)" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round">
    <!-- Circle -->
    <circle cx="24" cy="24" r="22" fill="rgba(255,255,255,0.12)"/>
    <!-- Handle -->
    <line x1="40" y1="40" x2="56" y2="56"/>
  </g>

  <!-- Bar chart inside the lens -->
  <g transform="translate(62, 56)" fill="white">
    <rect x="0" y="16" width="6" height="12" rx="1.5" opacity="0.8"/>
    <rect x="9" y="8" width="6" height="20" rx="1.5"/>
    <rect x="18" y="12" width="6" height="16" rx="1.5" opacity="0.8"/>
  </g>
</svg>
